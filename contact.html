/* <!-- About Us Header Banner --> */
  .header-banner {
      position: relative;
      margin-top: 100px; /* adjust if there's a fixed header */
      width: 100%;
      height: 30vh; /* responsive height */
      min-height: 400px;
      overflow: hidden;
    }

    /* Background image */
    .header-banner img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* Overlay */
    .overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.4);
      z-index: 1;
    }

     /* Heading container */
    .banner-text {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      z-index: 2;
      color: #fff;
    }

    .banner-text h1 {
      font-size: 3rem;
      font-weight: bold;
      margin: 0 0 15px 0;
      text-shadow: 0px 2px 6px rgba(0,0,0,0.5);
    }

    /* Line bar under heading */
    .banner-text .line-bar {
      width: 80px;
      height: 4px;
      background: #00e5ff; /* bright accent color */
      margin: 0 auto;
      border-radius: 2px;
    }

    .contact-section {
      max-width: 1100px;
      margin: 50px auto;
      background: #fff;
      box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.1);
      border-radius: 8px;
      overflow: hidden;
      display: flex;
      flex-wrap: wrap;
    }

    .contact-image {
      flex: 1;
      background: url('./images/contact.webp') no-repeat center center/cover;
      min-height: 400px;
    }

    .contact-form {
      flex: 1;
      padding: 40px;
    }

    .contact-form h2 {
      text-align: center;
      margin-bottom: 60px;
      font-size: 28px;
      font-weight: bold;
      color:  #008080;
    }

    .contact-form form {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
    }

    .form-group {
      flex: 1 1 48%;
      display: flex;
      flex-direction: column;
    }

    .form-group.full-width {
      flex: 1 1 100%;
    }

    label {
      font-size: 14px;
      margin-bottom: 5px;
      color: #333;
    }

    input, textarea {
      border: none;
      border-bottom: 1px solid #ccc;
      padding: 10px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.3s ease;
    }

    input:focus, textarea:focus {
      border-color: #00695c;
    }

    textarea {
      resize: none;
      min-height: 120px;
    }

    .submit-btn {
      /* background: #00695c; */
      background: #008080;
      color: #fff;
      padding: 12px 20px;
      font-size: 16px;
      font-weight: bold;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    .submit-btn:hover {
      background: #056857;
    }

    /* Responsive text scaling */
    @media (max-width: 1024px) {
      .header-banner h1 {
        font-size: 2.5rem;
      }
    }

    @media (max-width: 768px) {

    }

      <div class="contact-form">
        <h2>GET IN TOUCH</h2>
        <form id="contactForm">
          <div class="form-group">
            <label for="name">Name *</label>
            <input type="text" id="name" required>
          </div>
          <div class="form-group">
            <label for="phone">Phone *</label>
            <input type="tel" id="phone" required>
          </div>
          <div class="form-group">
            <label for="email">Email *</label>
            <input type="email" id="email" required>
          </div>
          <div class="form-group">
            <label for="subject">Subject</label>
            <input type="text" id="subject">
          </div>
          <div class="form-group full-width">
            <label for="message">Message</label>
            <textarea id="message"></textarea>
          </div>
          <div class="form-group full-width">
            <button type="submit" class="submit-btn">SEND MESSAGE</button>
          </div>
        </form>
    </div>

  <!-- ✅ Load EmailJS SDK -->
  <script type="text/javascript"
    src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js">
  </script>

  <script>
    (function(){
      emailjs.init("UWEN-PjzdiSzelgZg"); // Your EmailJS Public Key
    })();

    document.getElementById("contactForm").addEventListener("submit", function(e) {
      e.preventDefault();

      var formData = {
        from_name: document.getElementById("name").value,
        phone: document.getElementById("phone").value,
        reply_to: document.getElementById("email").value,
        subject: document.getElementById("subject").value,
        message: document.getElementById("message").value
      };

      emailjs.send("service_6iwcc89", "template_j1k2cap", formData)
        .then(function(response) {
          alert("✅ Message sent successfully!");
          document.getElementById("contactForm").reset();
        }, function(error) {
          alert("❌ Failed to send message. Error: " + JSON.stringify(error));
        });
    });
  </script>
